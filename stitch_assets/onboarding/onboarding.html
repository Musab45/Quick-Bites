<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>QuickBite Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700;800&amp;family=Inter:wght@400;500;600;700&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#dbe1ff",
              "on-background": "#191c1e",
              "background": "#f8f9fb",

              "tertiary-fixed": "#ffdbcd",
              "surface-container-low": "#f3f4f6",
              "error-container": "#ffdad6",
              "on-error": "#ffffff",
              "secondary": "#9d4300",
              "on-tertiary-container": "#ffede6",
              "surface-bright": "#f8f9fb",
              "primary-container": "#2563eb",
              "on-secondary-container": "#5c2400",
              "on-error-container": "#93000a",
              "surface": "#f8f9fb",
              "outline-variant": "#c3c6d7",
              "inverse-surface": "#2e3132",
              "secondary-container": "#fd761a",
              "primary": "#004ac6",
              "surface-tint": "#0053db",
              "outline": "#737686",
              "secondary-fixed-dim": "#ffb690",
              "on-tertiary-fixed-variant": "#7d2d00",
              "inverse-primary": "#b4c5ff",
              "surface-container-lowest": "#ffffff",
              "on-surface-variant": "#434655",
              "on-secondary-fixed-variant": "#783200",
              "surface-container-high": "#e7e8ea",
              "on-tertiary-fixed": "#360f00",
              "on-primary-container": "#eeefff",
              "tertiary-fixed-dim": "#ffb596",
              "on-primary": "#ffffff",
              "surface-container-highest": "#e1e2e4",
              "tertiary": "#943700",
              "on-surface": "#191c1e",
              "inverse-on-surface": "#f0f1f3",
              "error": "#ba1a1a",
              "primary-fixed-dim": "#b4c5ff",
              "surface-container": "#edeef0",
              "on-secondary-fixed": "#341100",
              "on-primary-fixed-variant": "#003ea8"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Inter"],
              "label": ["Inter"]
            },
            borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface font-body text-on-surface antialiased overflow-hidden">
<!-- Onboarding Container -->
<div class="relative h-screen w-full max-w-md mx-auto overflow-hidden flex flex-col">
<!-- Top Action: Skip -->
<div class="absolute top-10 right-6 z-30">
<button class="text-on-surface-variant font-label text-sm font-semibold tracking-wide px-4 py-2 hover:bg-surface-container-high rounded-full transition-colors">
                Skip
            </button>
</div>
<!-- Illustration Section (Top 55%) -->
<div class="h-[55%] relative w-full overflow-hidden bg-primary-fixed/20">
<!-- Animated Content Simulation -->
<div class="absolute inset-0 flex items-center justify-center p-12">
<div class="relative w-full aspect-square">
<!-- Geometric Editorial Accents -->
<div class="absolute -top-10 -left-10 w-40 h-40 bg-secondary-fixed opacity-40 rounded-full blur-3xl"></div>
<div class="absolute -bottom-10 -right-10 w-32 h-32 bg-primary-fixed opacity-40 rounded-full blur-2xl"></div>
<!-- Main Illustration Placeholder -->
<img alt="Gourmet food on a clean plate" class="w-full h-full object-cover rounded-[32px] shadow-2xl transform rotate-3 scale-95 border-4 border-white" data-alt="Premium food photography showing a gourmet dish" src="https://lh3.googleusercontent.com/aida-public/AB6AXuDTp90NJgx44UCArpdj5ayAiOPcidIaJIEeblKP8ap_QW7BZFDKnxhIvv2KC70xfzNcB-d_dkzatlhqzhWbDZuDxn9mPfIUOgYz9FLeCS6NMEfDTVzQHkBdgt4ahVpPg14MZrIS2H1mMN4mhFHEGQK9wImUchwZg-MjT4xtSgncNp_gxIEd1H3v725LFEY_pn7s_AprukZ4xZcxW4YOgOu_RV0JDoKToJZgeVlNNBwg_OXVF-Ih9mkF1SE1MPo6dKqzM-pxJs9RjQ"/>
</div>
</div>
</div>
<!-- Content Area (Bottom Sheet Intent) -->
<div class="flex-1 bg-surface-container-lowest rounded-t-[40px] shadow-[0_-12px_40px_rgba(0,0,0,0.08)] px-8 pt-10 pb-12 flex flex-col relative z-20">
<!-- Slide Title & Subtitle -->
<div class="flex-1 flex flex-col gap-4">
<h1 class="font-headline font-bold text-[28px] leading-tight text-on-surface tracking-tight">
                    Editorial Taste, <br/>Delivered to Your Door.
                </h1>
<p class="font-body text-on-surface-variant text-[15px] leading-relaxed max-w-[90%]">
                    Experience a curated selection of the city's finest culinary gems, delivered with frictionless precision.
                </p>
</div>
<!-- Interaction Layer -->
<div class="mt-auto space-y-8">
<!-- Dot Indicators -->
<div class="flex items-center gap-2">
<!-- Active Dot -->
<div class="h-1.5 w-6 rounded-full bg-primary transition-all duration-300"></div>
<!-- Inactive Dots -->
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
<div class="h-1.5 w-1.5 rounded-full bg-outline-variant"></div>
</div>
<!-- Primary CTA Button -->
<button class="w-full bg-primary text-on-primary font-label font-bold py-4 rounded-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2 group">
<span>Next</span>
<span class="material-symbols-outlined text-lg group-hover:translate-x-1 transition-transform" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
</div>
<!-- Decorative Subtle Gradients for Depth -->
<div class="absolute bottom-0 left-0 right-0 h-1/4 bg-gradient-to-t from-background to-transparent pointer-events-none -z-10"></div>
</div>
<!-- Hidden Navigation Shell suppression based on "Linear/Transactional" logic -->
<!-- SideNav/BottomNavBar suppressed for Onboarding -->
</body></html>
