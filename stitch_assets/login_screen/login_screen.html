<div class="relative w-20 h-20 bg-primary-container rounded-xl flex items-center justify-center editorial-shadow rotate-3 mb-6">

</div>
</div>

</div>

<h2 class="font-headline font-bold text-2xl text-on-surface mb-2">Welcome Back</h2>
<p class="font-body text-sm text-on-surface-variant">Login to continue your food journey</p>
</div>
<!-- Login Form -->
<form class="w-full space-y-6" onsubmit="return false;">
<div class="space-y-4">
<!-- Email Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">mail</span>
</div>
<input class="w-full h-14 pl-12 pr-4 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg transition-all font-body text-on-surface placeholder:text-outline/60 outline-none" placeholder="Email address" type="email"/>
</div>
<!-- Password Input -->
<div class="relative group">
<div class="absolute inset-y-0 left-4 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline text-lg">lock</span>
</div>
<input class="w-full h-14 pl-12 pr-12 bg-surface-container-low border-b-2 border-transparent focus:border-primary focus:ring-0 rounded-t-lg transition-all font-body text-on-surface placeholder:text-outline/60 outline-none" placeholder="Password" type="password"/>
<button class="absolute inset-y-0 right-4 flex items-center text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined text-xl">visibility</span>
</button>
</div>
</div>
<!-- Forgot Password -->
<div class="flex justify-end">
<a class="font-label text-sm text-primary font-bold hover:underline" href="../../README.md">Forgot Password?</a>
</div>
<!-- CTA Button -->
<button class="w-full h-14 bg-primary-container text-on-primary-container font-headline font-bold rounded-lg editorial-shadow hover:opacity-90 active:scale-95 transition-all duration-150">
                Log In
            </button>
</form>
<!-- Divider -->
<div class="w-full flex items-center my-10 px-4">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="px-4 font-label text-[10px] tracking-widest text-outline uppercase font-bold">Or login with</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Buttons -->
<div class="flex gap-4 w-full justify-center mb-12">
<button class="w-14 h-14 rounded-full bg-surface-container-low flex items-center justify-center hover:bg-surface-container-high transition-colors active:scale-90 duration-150">

<span class="material-symbols-outlined text-[#1877F2] text-3xl" style="font-variation-settings: 'FILL' 1;">social_leaderboard</span>
