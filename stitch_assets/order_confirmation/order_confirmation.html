<p class="font-body text-on-surface-variant text-base">Your food is being prepared</p>
<div class="pt-4">
<div class="inline-flex items-center bg-surface-container-high px-4 py-1.5 rounded-full">
<span class="text-on-surface-variant font-label text-[11px] uppercase tracking-wider font-bold">Order ID: #QB-92841</span>
</div>
</div>
</div>

</div>
<div>

</div>
</div>
<div class="text-right">
<span class="material-symbols-outlined text-outline-variant" data-icon="restaurant">restaurant</span>
</div>
</div>
</div>
