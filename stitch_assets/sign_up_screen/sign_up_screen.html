<body class="bg-surface font-body text-on-surface antialiased min-h-screen flex flex-col">
<!-- Header Navigation (Simplified for Transactional Flow) -->
<header class="flex items-center justify-between px-6 h-16 w-full bg-white transition-opacity">
<div class="flex items-center gap-4">
<button class="p-2 -ml-2 hover:opacity-80 active:scale-95 duration-100 transition-all">
<span class="material-symbols-outlined text-primary" data-icon="arrow_back">arrow_back</span>
</button>
</div>
<div class="text-xl font-extrabold text-blue-600 font-headline tracking-tight">QuickBite</div>
<div class="w-10"></div> <!-- Spacer to center the brand -->
</header>
<main class="flex-grow flex items-center justify-center px-6 py-8">
<div class="w-full max-w-md">
<!-- Hero Header Section -->
<div class="mb-10 text-center">
<h1 class="font-headline font-extrabold text-[2.75rem] leading-tight tracking-tight text-on-surface mb-2">Create Account</h1>
<p class="text-on-surface-variant body-md max-w-[280px] mx-auto">Join the QuickBite community today</p>
</div>
<!-- Form Card -->
<div class="bg-surface-container-lowest editorial-shadow rounded-xl p-8 mb-8 border border-outline-variant/15">
<form class="space-y-6">
<!-- Full Name -->
<div class="group">
<label class="block text-on-surface font-bold text-[0.6875rem] uppercase tracking-wider mb-2">Full Name</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-0 py-3 text-body-md transition-all placeholder:text-outline/60" placeholder="Enter your name" type="text"/>
</div>
</div>
<!-- Email -->
<div class="group">
<label class="block text-on-surface font-bold text-[0.6875rem] uppercase tracking-wider mb-2">Email address</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-0 py-3 text-body-md transition-all placeholder:text-outline/60" placeholder="name@example.com" type="email"/>
</div>
</div>
<!-- Phone Number -->
<div class="group">
<label class="block text-on-surface font-bold text-[0.6875rem] uppercase tracking-wider mb-2">Phone Number</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-0 py-3 text-body-md transition-all placeholder:text-outline/60" placeholder="+1 (555) 000-0000" type="tel"/>
</div>
</div>
<!-- Password -->
<div class="group">
<label class="block text-on-surface font-bold text-[0.6875rem] uppercase tracking-wider mb-2">Password</label>
<div class="relative">
<input class="w-full bg-surface-container-low border-0 border-b-2 border-transparent focus:border-primary focus:ring-0 px-0 py-3 text-body-md transition-all placeholder:text-outline/60" placeholder="Min. 8 characters" type="password"/>
<button class="absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-primary transition-colors" type="button">
<span class="material-symbols-outlined" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Terms Checkbox -->
<div class="flex items-start gap-3 pt-2">
<div class="flex items-center h-5">
<input class="h-5 w-5 rounded border-outline-variant text-primary focus:ring-primary transition-all" id="terms" type="checkbox"/>
</div>
<label class="text-[0.875rem] text-on-surface-variant leading-relaxed" for="terms">
                            By signing up, you agree to our <a class="text-primary font-medium hover:underline" href="../../README.md">Terms and Conditions</a>
</label>
</div>
<!-- Primary CTA -->
<button class="w-full bg-primary-container text-white font-headline font-bold py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-all editorial-shadow mt-4" type="submit">
                        Sign Up
                    </button>
</form>
<!-- Divider -->
<div class="relative my-10 flex items-center">
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
<span class="px-4 text-[0.6875rem] font-bold text-outline uppercase tracking-widest">Or sign up with</span>
<div class="flex-grow h-[1px] bg-outline-variant/30"></div>
</div>
<!-- Social Logins -->
<div class="grid grid-cols-3 gap-4">
<button class="flex items-center justify-center h-14 rounded-full border border-outline-variant/30 hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface group-hover:scale-110 transition-transform" data-icon="google">google</span>
</button>
<button class="flex items-center justify-center h-14 rounded-full border border-outline-variant/30 hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface group-hover:scale-110 transition-transform" data-icon="facebook">social_leaderboard</span>
</button>
<button class="flex items-center justify-center h-14 rounded-full border border-outline-variant/30 hover:bg-surface-container-low transition-colors group">
<span class="material-symbols-outlined text-on-surface group-hover:scale-110 transition-transform" data-icon="apple" data-weight="fill" style="font-variation-settings: 'FILL' 1;">ios</span>
</button>
</div>
</div>
<!-- Footer Link -->
<div class="text-center pb-12">
<p class="text-on-surface-variant body-md">
                    Already have an account? 
                    <a class="text-primary font-bold hover:underline ml-1" href="../login_screen/login_screen.html">Log In</a>
</p>
</div>
</div>
</main>
